name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd services/platform-api
          pip install -r requirements.txt
          pip install pytest ruff
      - name: Lint
        run: cd services/platform-api && ruff check app/ || true
      - name: Type check (basic)
        run: cd services/platform-api && python -c "import app.main; print('Imports OK')"
      - name: Run critical tests
        run: cd services/platform-api && python -m pytest tests/unit/test_intent_router/ -v || true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & build
        run: |
          cd apps/web
          npm install
          npm run build --if-present || echo "Build step skipped in early dev"
      - name: Lint
        run: cd apps/web && npm run lint --if-present || true

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt & validate
        run: |
          cd infra/terraform/envs/dev
          terraform fmt -check || true
          terraform init -backend=false || true
          terraform validate || true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan (non-blocking for now)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
