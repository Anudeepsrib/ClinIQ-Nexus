version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cliniq-postgres
    environment:
      POSTGRES_USER: cliniq
      POSTGRES_PASSWORD: cliniq_dev_password
      POSTGRES_DB: cliniq_nexus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cliniq -d cliniq_nexus"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cliniq-network

  redis:
    image: redis:7-alpine
    container_name: cliniq-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cliniq-network

  platform-api:
    build:
      context: ./services/platform-api
      dockerfile: Dockerfile
    container_name: cliniq-api
    environment:
      - DATABASE_URL=postgresql+asyncpg://cliniq:cliniq_dev_password@postgres:5432/cliniq_nexus
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - USE_REAL_AWS=false
      - JWT_SECRET=dev-jwt-secret-change-in-prod-please
      - DEFAULT_TENANT_ID=tenant_hospital_a
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/platform-api:/app
      - ./data:/app/data
    networks:
      - cliniq-network
    command: >
      sh -c "
        alembic upgrade head &&
        python scripts/seed_demo_data.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: cliniq-web
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_USE_MOCK_AUTH=true
    ports:
      - "3000:3000"
    depends_on:
      - platform-api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    networks:
      - cliniq-network
    command: npm run dev

volumes:
  postgres_data:

networks:
  cliniq-network:
    driver: bridge
